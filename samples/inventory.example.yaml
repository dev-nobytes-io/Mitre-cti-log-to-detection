# ATT&CK v18+ log-source inventory (replaces the v1.2 DeTT&CT
# `data_sources` block). Each entry is a (name, channel) tuple feeding a
# data component. Score 0..5 for the quality of telemetry you collect;
# scores flow up the chain Log Source -> Data Component -> Analytic ->
# Detection Strategy -> Technique. An analytic only lights up when
# every log source it depends on has score > 0.
version: 1.3
file_type: data-source-administration
name: Example inventory
systems:
  - applicable_to: all
    description: Default system

log_sources:
  # Process telemetry — feeds DET0001 (Suspicious Process Creation Chains)
  # and DET0004 (Credential Access via OS Tools).
  - { name: sysmon,           channel: "1",         score: 5, comment: "Process Creation w/ parent + cmdline + hash" }
  - { name: sysmon,           channel: "10",        score: 2, comment: "Process Access (lsass watch)" }
  - { name: windows-security, channel: "4688",      score: 4, comment: "Process auditing" }
  - { name: auditd,           channel: "execve",    score: 3, comment: "Linux execve syscalls" }
  - { name: powershell,       channel: "4104",      score: 5, comment: "ScriptBlock logging org-wide" }

  # Network — feeds DET0006 (C2 Beaconing).
  - { name: sysmon,           channel: "3",         score: 4, comment: "Network Connection Creation" }
  - { name: zeek,             channel: "conn",      score: 4, comment: "Egress flow logs" }
  - { name: zeek,             channel: "http",      score: 3, comment: "HTTP content via Zeek" }
  - { name: zeek,             channel: "ssl",       score: 3, comment: "TLS metadata" }
  - { name: suricata,         channel: "alert",     score: 2, comment: "IDS alerts" }
  - { name: netflow,          channel: "v9",        score: 3, comment: "Edge router NetFlow" }

  # Identity / logon — feeds DET0002 (Lateral Movement via Remote Logon)
  # and DET0004 brute-force analytic.
  - { name: windows-security, channel: "4624",      score: 5, comment: "Successful logon" }
  - { name: windows-security, channel: "4625",      score: 5, comment: "Failed logon" }
  - { name: auditd,           channel: "USER_LOGIN", score: 3, comment: "Linux auth" }
  - { name: okta,             channel: "system",    score: 4, comment: "Okta system log" }
  - { name: azure-signinlogs, channel: "SignInLogs", score: 4, comment: "Azure AD sign-ins" }
  - { name: application-log,  channel: "generic",   score: 3, comment: "App audit logs to SIEM" }
  - { name: m365,             channel: "unifiedauditlog", score: 4, comment: "M365 unified audit" }

  # File telemetry — feeds DET0003 fragments and several legacy detections.
  - { name: sysmon,           channel: "11",        score: 3, comment: "File Creation" }
