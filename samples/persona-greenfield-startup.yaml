# Persona: Greenfield startup, week 1 of detection
# ------------------------------------------------------------------
# A 30-person startup that just deployed CrowdStrike Falcon to all
# laptops and that's it. No SIEM, no log aggregation, no network
# instrumentation, no cloud audit beyond the default AWS CloudTrail
# trail nobody reads. Use this as the "before" picture against which
# the mature-enterprise persona is the "after". Lots of red on the
# Navigator heatmap — useful to drive a conversation about what
# additional sources would unlock the most coverage.
# ------------------------------------------------------------------
version: 1.2
file_type: data-source-administration
name: Greenfield startup
systems:
  - applicable_to: all
    description: 30 employees, MacOS + Windows laptops, AWS prod

data_sources:
  - data_source_name: Process
    score: 3
    comment: CrowdStrike Falcon on every laptop
    data_source:
      - { name: Process Creation,    score: 4, comment: "EDR process events" }
      - { name: Process Termination, score: 3, comment: "" }
      - { name: Process Metadata,    score: 3, comment: "" }
      - { name: Process Access,      score: 1, comment: "EDR-derived, sparse" }
      - { name: OS API Execution,    score: 2, comment: "EDR-derived" }

  - data_source_name: Command
    score: 3
    data_source:
      - { name: Command Execution, score: 3, comment: "EDR cmdline capture" }

  - data_source_name: File
    score: 2
    data_source:
      - { name: File Creation,     score: 3, comment: "EDR file events" }
      - { name: File Modification, score: 2, comment: "" }
      - { name: File Deletion,     score: 1, comment: "" }
      - { name: File Metadata,     score: 1, comment: "" }
      - { name: File Access,       score: 0, comment: "" }

  - data_source_name: Module
    score: 2
    data_source:
      - { name: Module Load, score: 2, comment: "EDR module load" }

  - data_source_name: Network Traffic
    score: 1
    comment: Only what EDR observes from the host
    data_source:
      - { name: Network Connection Creation, score: 2, comment: "EDR network events" }
      - { name: Network Traffic Flow,        score: 1, comment: "" }
      - { name: Network Traffic Content,     score: 0, comment: "" }

  - data_source_name: Logon Session
    score: 1
    data_source:
      - { name: Logon Session Creation, score: 1, comment: "EDR logon hints, no AAA aggregation" }

  - data_source_name: User Account
    score: 1
    comment: AWS Console + Google Workspace, neither shipped to a SIEM
    data_source:
      - { name: User Account Authentication, score: 1, comment: "Google Workspace audit (queried ad-hoc)" }
      - { name: User Account Creation,       score: 1, comment: "" }

  - data_source_name: Cloud Service
    score: 1
    data_source:
      - { name: Cloud Service Modification, score: 1, comment: "CloudTrail enabled but unmonitored" }
      - { name: Cloud Service Enumeration,  score: 0, comment: "" }

  # Explicitly zero — visualizes what's missing
  - data_source_name: Windows Registry
    score: 0
  - data_source_name: Active Directory
    score: 0
  - data_source_name: WMI
    score: 0
  - data_source_name: Scheduled Job
    score: 0
  - data_source_name: Service
    score: 0
  - data_source_name: Driver
    score: 0
  - data_source_name: Application Log
    score: 0
  - data_source_name: Cloud Storage
    score: 0
  - data_source_name: Container
    score: 0
  - data_source_name: Pod
    score: 0
